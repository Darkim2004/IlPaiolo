<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Eventi</title>
</head>
<body>

<h1>Eventi in programma</h1>

<a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/eventi/new}">Crea evento</a>

<div th:if="${#lists.isEmpty(eventi)}">
    <p>Nessun evento disponibile al momento.</p>
</div>

<div th:each="evento : ${eventi}">
    <h2 th:text="${evento.nome}"></h2>
    <p th:text="${evento.data}"></p>
    <p th:text="${evento.oraInizio} + ' - ' + ${evento.oraFine}"></p>
    <p>Posti disponibili:
        <span th:text="${evento.numeroMaxPartecipanti - evento.iscrizioni.size()}"></span>
    </p>
    <a th:href="@{/eventi/{id}(id=${evento.id})}">Dettaglio</a>

    <form sec:authorize="isAuthenticated()"
          th:if="${iscrizioniUtente == null or !iscrizioniUtente.contains(evento.id)}"
          th:action="@{/eventi/{id}/iscriviti(id=${evento.id})}"
          method="post">
        <button type="submit">Iscriviti</button>
    </form>
    <p sec:authorize="isAuthenticated()"
       th:if="${iscrizioniUtente != null and iscrizioniUtente.contains(evento.id)}">
        Sei già iscritto
    </p>
    <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login per iscriverti</a>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/eventi/{id}/iscrizioni(id=${evento.id})}">Gestisci iscrizioni</a>

    <form sec:authorize="hasRole('ADMIN')"
          th:action="@{/admin/eventi/{id}/stato(id=${evento.id})}"
          method="post">
        <select name="stato">
            <option value="APERTO" th:selected="${evento.stato.name() == 'APERTO'}">Aperto</option>
            <option value="CHIUSO" th:selected="${evento.stato.name() == 'CHIUSO'}">Chiuso</option>
            <option value="ANNULLATO" th:selected="${evento.stato.name() == 'ANNULLATO'}">Annullato</option>
            <option value="COMPLETATO" th:selected="${evento.stato.name() == 'COMPLETATO'}">Completato</option>
        </select>
        <button type="submit">Cambia stato</button>
    </form>
</div>

</body>
</html>
