<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Accesso negato - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="error-page event-panel">
            <p class="eyebrow">Accesso negato</p>
            <h1>Area riservata</h1>
            <p class="intro" th:text="${messaggio != null ? messaggio : 'Questa sezione richiede permessi diversi.'}">
                Questa sezione richiede permessi diversi.
            </p>
            <div class="form-actions">
                <a class="primary-button" th:href="@{/}">Home</a>
                <a class="ghost-button" th:href="@{/prenotazioni}">Prenotazioni</a>
            </div>
        </section>
    </main>
</body>
</html>
