<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Non trovato - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="error-page event-panel">
            <p class="eyebrow">404</p>
            <h1>Risorsa non trovata</h1>
            <p class="intro" th:text="${messaggio != null ? messaggio : 'La pagina richiesta non esiste o non e piu disponibile.'}">
                La pagina richiesta non esiste o non e piu disponibile.
            </p>
            <div class="form-actions">
                <a class="primary-button" th:href="@{/}">Home</a>
                <a class="ghost-button" th:href="@{/eventi}">Eventi</a>
            </div>
        </section>
    </main>
</body>
</html>
