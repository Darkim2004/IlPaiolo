<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h1>Accedi</h1>

<p th:if="${param.error}">Email o password non validi.</p>
<p th:if="${param.logout}">Logout effettuato con successo.</p>

<form th:action="@{/perform-login}" method="post">
    <input th:replace="~{componenti :: csrfInput}">

    <div>
        <label for="email">Email</label>
        <input id="email" type="email" name="email" autocomplete="email" required>
    </div>

    <div>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required>
    </div>

    <button type="submit">Accedi</button>
</form>

<p>
    Non hai un account?
    <a th:href="@{/register}">Registrati</a>
</p>

<p>
    <a th:href="@{/}">Torna alla home</a>
</p>

</body>
</html>
