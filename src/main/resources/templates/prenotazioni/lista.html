<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Le mie prenotazioni</title>
</head>
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href="@{/admin/tavoli}">Tavoli</a>
    <a th:href="@{/eventi}">Eventi</a>
    <a th:href="@{/giochi}">Giochi</a>
</nav>

<hr>

<h1>Le mie prenotazioni</h1>

<div th:if="${successo}">
    <p th:text="${successo}"></p>
</div>

<p th:if="${#lists.isEmpty(prenotazioni)}">
    Non hai ancora nessuna prenotazione.
</p>

<div th:each="p : ${prenotazioni}">
    <hr>
    <p>
        <strong>Tavolo <span th:text="${p.tavolo.numero}"></span></strong>
        <span th:if="${p.tavolo.nome != null}"> · <span th:text="${p.tavolo.nome}"></span></span>
    </p>
    <p>Data: <span th:text="${p.data}"></span></p>
    <p>Orario: <span th:text="${p.oraInizio}"></span> – <span th:text="${p.oraFine}"></span></p>
    <p>Persone: <span th:text="${p.numeroPersone}"></span></p>
    <p th:if="${p.note != null and !p.note.isEmpty()}">Note: <span th:text="${p.note}"></span></p>

    <div th:if="${p.data.isAfter(#temporals.createToday())}">
        <a th:href="@{/prenotazioni/{id}/modifica(id=${p.id})}">Modifica</a>
        <form th:action="@{/prenotazioni/{id}/elimina(id=${p.id})}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" onclick="return confirm('Vuoi annullare questa prenotazione?')">Annulla</button>
        </form>
    </div>
</div>

<hr>
<a href="/prenotazioni/nuova">+ Nuova prenotazione</a>

<!-- Sezione visibile solo agli admin -->
<div th:if="${isAdmin}">
    <hr>
    <h2>Tutte le prenotazioni (Admin)</h2>

    <p th:if="${#lists.isEmpty(tutteLePrenotazioni)}">Nessuna prenotazione nel sistema.</p>

    <table th:unless="${#lists.isEmpty(tutteLePrenotazioni)}">
        <thead>
        <tr>
            <th>Utente</th>
            <th>Tavolo</th>
            <th>Data</th>
            <th>Orario</th>
            <th>Persone</th>
            <th>Note</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${tutteLePrenotazioni}">
            <td th:text="${p.utente.nome + ' ' + p.utente.cognome}"></td>
            <td th:text="'Tavolo ' + ${p.tavolo.numero}"></td>
            <td th:text="${p.data}"></td>
            <td th:text="${p.oraInizio + ' – ' + p.oraFine}"></td>
            <td th:text="${p.numeroPersone}"></td>
            <td th:text="${p.note != null ? p.note : '-'}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
