<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Accedi - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/register}, 'Registrati')}"></header>

    <main>
        <section class="auth-shell" aria-labelledby="login-title">
            <div class="auth-copy">
                <p class="eyebrow">Area giocatori</p>
                <h1 id="login-title">Accedi al Paiolo</h1>
                <p class="intro">Rientra nel tuo profilo per seguire eventi, prenotazioni e serate al tavolo.</p>
            </div>

            <form class="auth-panel event-panel" th:action="@{/perform-login}" method="post">
                <input th:replace="~{componenti :: csrfInput}">

                <div class="auth-panel-header">
                    <h2>Login</h2>
                    <p>Usa l'email con cui hai creato il tuo account.</p>
                </div>

                <p class="auth-alert auth-alert-error" th:if="${param.error}">Email o password non validi.</p>
                <p class="auth-alert auth-alert-success" th:if="${param.logout}">Logout effettuato con successo.</p>

                <div class="auth-form-fields">
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" autocomplete="email" required>
                    </div>

                    <div class="form-field">
                        <label for="password">Password</label>
                        <input id="password" type="password" name="password" autocomplete="current-password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="primary-button" type="submit">Accedi</button>
                    <a class="ghost-button" th:href="@{/}">Home</a>
                </div>

                <p class="auth-switch">
                    Non hai un account?
                    <a class="text-link" th:href="@{/register}">Registrati</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
