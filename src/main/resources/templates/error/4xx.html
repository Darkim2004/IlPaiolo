<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Errore - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="error-page event-panel">
            <p class="eyebrow">Errore</p>
            <h1>Qualcosa non e andato</h1>
            <p class="intro" th:text="${messaggio != null ? messaggio : 'La richiesta non puo essere completata.'}">
                La richiesta non puo essere completata.
            </p>
            <div class="form-actions">
                <a class="primary-button" th:href="@{/}">Home</a>
            </div>
        </section>
    </main>
</body>
</html>
