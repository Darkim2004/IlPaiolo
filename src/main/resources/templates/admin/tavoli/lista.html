<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Gestione tavoli - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="page-hero" aria-labelledby="gestione-tavoli-title">
            <div>
                <p class="eyebrow">Area admin</p>
                <h1 id="gestione-tavoli-title">Gestione tavoli</h1>
                <p class="intro">Controlla disponibilita', capienza e stato operativo dei tavoli del locale.</p>
            </div>
            <a class="primary-button" th:href="@{/admin/tavoli/nuovo}">Nuovo tavolo</a>
        </section>

        <div th:replace="~{componenti :: flashMessages}"></div>

        <th:block th:if="${#lists.isEmpty(tavoli)}">
            <section th:replace="~{componenti :: emptyPanel('Nessun tavolo presente', 'Aggiungi il primo tavolo per iniziare a gestire le prenotazioni.')}"></section>
        </th:block>

        <section class="admin-section event-panel" th:unless="${#lists.isEmpty(tavoli)}">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">Tavoli</p>
                    <h2>Configurazione sala</h2>
                </div>
                <span class="status-badge" th:text="|${#lists.size(tavoli)} tavoli|">0 tavoli</span>
            </div>

            <div class="data-table-wrap">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Numero</th>
                        <th>Nome</th>
                        <th>Capienza</th>
                        <th>Posizione</th>
                        <th>Disponibile</th>
                        <th>Attivo</th>
                        <th>Prenotazioni</th>
                        <th>Azioni</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${tavoli}">
                        <td th:text="${t.numero}">1</td>
                        <td th:text="${t.nome != null and !#strings.isEmpty(t.nome) ? t.nome : '-'}">Sala</td>
                        <td th:text="${t.capienza}">4</td>
                        <td th:text="${t.posizione}">INTERNO</td>
                        <td><span class="status-badge" th:text="${t.disponibile ? 'Si' : 'No'}">Si</span></td>
                        <td><span class="status-badge" th:text="${t.attivo ? 'Si' : 'No'}">Si</span></td>
                        <td th:text="${t.prenotazioni.size()}">0</td>
                        <td>
                            <div class="table-action-group">
                                <a class="ghost-button" th:href="@{/admin/tavoli/{id}/modifica(id=${t.id})}">Modifica</a>

                                <form th:if="${t.attivo}" th:action="@{/admin/tavoli/{id}/disattiva(id=${t.id})}" method="post">
                                    <input th:replace="~{componenti :: csrfInput}">
                                    <button class="ghost-button" type="submit" onclick="return confirm('Vuoi disattivare questo tavolo?')">Disattiva</button>
                                </form>

                                <form th:unless="${t.attivo}" th:action="@{/admin/tavoli/{id}/attiva(id=${t.id})}" method="post">
                                    <input th:replace="~{componenti :: csrfInput}">
                                    <button class="ghost-button" type="submit" onclick="return confirm('Vuoi riattivare questo tavolo?')">Attiva</button>
                                </form>

                                <form th:action="@{/admin/tavoli/{id}/elimina(id=${t.id})}" method="post">
                                    <input th:replace="~{componenti :: csrfInput}">
                                    <button class="danger-button" type="submit" onclick="return confirm('Vuoi eliminare questo tavolo?')">Elimina</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
