<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Modifica prenotazione - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="page-hero" aria-labelledby="modifica-prenotazione-title">
            <div>
                <p class="eyebrow">Prenotazioni</p>
                <h1 id="modifica-prenotazione-title">Modifica prenotazione</h1>
                <p class="intro">Aggiorna orario, numero di persone o note per il tavolo gia' prenotato.</p>
            </div>
        </section>

        <form class="game-form event-panel"
              th:action="@{/prenotazioni/{id}/modifica(id=${prenotazione.id})}"
              method="post">
            <input th:replace="~{componenti :: csrfInput}">

            <div class="summary-grid form-field-wide">
                <div>
                    <span class="detail-label">Tavolo attuale</span>
                    <strong>
                        Tavolo <span th:text="${prenotazione.tavolo.numero}">1</span>
                        <span th:if="${prenotazione.tavolo.nome != null and !#strings.isEmpty(prenotazione.tavolo.nome)}" th:text="' - ' + ${prenotazione.tavolo.nome}"> - Sala</span>
                    </strong>
                </div>
                <div>
                    <span class="detail-label">Capienza</span>
                    <strong th:text="|${prenotazione.tavolo.capienza} posti|">4 posti</strong>
                </div>
            </div>

            <div class="form-grid">
                <div class="form-field">
                    <label for="data">Data</label>
                    <input id="data" type="date" name="data" th:value="${prenotazione.data}" required>
                </div>

                <div class="form-field">
                    <label for="oraInizio">Ora inizio</label>
                    <input id="oraInizio" type="time" name="oraInizio" th:value="${prenotazione.oraInizio}" required>
                </div>

                <div class="form-field">
                    <label for="oraFine">Ora fine</label>
                    <input id="oraFine" type="time" name="oraFine" th:value="${prenotazione.oraFine}" required>
                </div>

                <div class="form-field">
                    <label for="numeroPersone">Numero persone</label>
                    <input id="numeroPersone" type="number" name="numeroPersone" min="1" th:value="${prenotazione.numeroPersone}" required>
                </div>

                <div class="form-field form-field-wide">
                    <label for="note">Note</label>
                    <textarea id="note" name="note" rows="3" th:text="${prenotazione.note}"></textarea>
                </div>
            </div>

            <div class="form-actions">
                <button class="primary-button" type="submit">Salva modifiche</button>
                <a class="ghost-button" th:href="@{/prenotazioni/mie}">Annulla</a>
            </div>
        </form>
    </main>
</body>
</html>
