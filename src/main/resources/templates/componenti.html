<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(titolo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titolo}">Il Paiolo</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
    <header th:fragment="siteHeader(authHref, authLabel)" class="site-header">
        <nav class="navbar" aria-label="Navigazione principale">
            <a class="brand" th:href="@{/}">
                <img class="brand-logo" th:src="@{/images/IlPaiolo_logo.png}" alt="Logo Il Paiolo">
                <span class="brand-name">Il Paiolo</span>
            </a>

            <div class="nav-links">
                <a th:href="@{/prenotazioni}">Prenotazioni</a>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/tavoli}">Tavoli</a>
                <a th:href="@{/eventi}">Eventi</a>
                <a th:href="@{/giochi}">Giochi</a>
            </div>

            <div class="nav-auth">
                <a class="login-button" sec:authorize="!isAuthenticated()" th:href="${authHref}" th:text="${authLabel}">Login</a>
                <div class="user-area" sec:authorize="isAuthenticated()">
                    <span class="user-greeting">
                        Ciao
                        <strong th:text="${nomeUtente != null ? nomeUtente : 'Giocatore'}">Giocatore</strong>
                    </span>
                    <form th:action="@{/logout}" method="post">
                        <input th:replace="~{componenti :: csrfInput}">
                        <button class="ghost-button" type="submit">Esci</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <input th:fragment="csrfInput"
           type="hidden"
           th:if="${_csrf != null}"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}">

    <section th:fragment="pageHero(eyebrow, heroTitle, intro)" class="page-hero" aria-labelledby="page-title">
        <div>
            <p class="eyebrow" th:text="${eyebrow}">Il Paiolo</p>
            <h1 id="page-title" th:text="${heroTitle}">Titolo pagina</h1>
            <p class="intro" th:text="${intro}">Testo introduttivo.</p>
        </div>
    </section>

    <div th:fragment="flashMessages" class="flash-messages"
         th:if="${successo != null or successMessage != null or errore != null}">
        <p class="auth-alert auth-alert-success" th:if="${successo != null}" th:text="${successo}">Operazione completata.</p>
        <p class="auth-alert auth-alert-success" th:if="${successMessage != null}" th:text="${successMessage}">Operazione completata.</p>
        <p class="auth-alert auth-alert-error" th:if="${errore != null}" th:text="${errore}">Operazione non riuscita.</p>
    </div>

    <section th:fragment="emptyPanel(title, message)" class="empty-panel">
        <img class="empty-logo" th:src="@{/images/IlPaiolo_logo.png}" alt="">
        <h2 th:text="${title}">Nessun contenuto</h2>
        <p th:text="${message}">Torna piu tardi.</p>
    </section>
</body>
</html>
