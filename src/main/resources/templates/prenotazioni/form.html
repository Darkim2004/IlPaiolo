<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Prenota un tavolo - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="page-hero" aria-labelledby="prenota-title">
            <div>
                <p class="eyebrow">Prenotazioni</p>
                <h1 id="prenota-title">Prenota un tavolo</h1>
                <p class="intro">Scegli giorno, orario e numero di persone: ti mostreremo i tavoli disponibili.</p>
            </div>
        </section>

        <form class="game-form event-panel" th:action="@{/prenotazioni/nuova/cerca}" method="post">
            <input th:replace="~{componenti :: csrfInput}">

            <div class="form-grid">
                <div class="form-field">
                    <label for="data">Data</label>
                    <input id="data" type="date" name="data" required>
                </div>

                <div class="form-field">
                    <label for="oraInizio">Ora inizio</label>
                    <input id="oraInizio" type="time" name="oraInizio" required>
                </div>

                <div class="form-field">
                    <label for="oraFine">Ora fine</label>
                    <input id="oraFine" type="time" name="oraFine" required>
                </div>

                <div class="form-field">
                    <label for="numeroPersone">Numero persone</label>
                    <input id="numeroPersone" type="number" name="numeroPersone" min="1" value="1" required>
                </div>
            </div>

            <div class="form-actions">
                <button class="primary-button" type="submit">Cerca tavoli disponibili</button>
                <a class="ghost-button" th:href="@{/prenotazioni}">Le mie prenotazioni</a>
            </div>
        </form>
    </main>
</body>
</html>
