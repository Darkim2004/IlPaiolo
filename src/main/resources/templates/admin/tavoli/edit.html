<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Modifica tavolo - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="page-hero" aria-labelledby="modifica-tavolo-title">
            <div>
                <p class="eyebrow">Area admin</p>
                <h1 id="modifica-tavolo-title">Modifica tavolo</h1>
                <p class="intro">Aggiorna i dati del tavolo mantenendo coerenti disponibilita' e capienza.</p>
            </div>
        </section>

        <form class="game-form event-panel"
              th:action="@{/admin/tavoli/{id}/modifica(id=${tavolo.id})}"
              th:object="${tavolo}"
              method="post">
            <input th:replace="~{componenti :: csrfInput}">

            <div class="form-grid">
                <div class="form-field">
                    <label for="numero">Numero</label>
                    <input id="numero" type="number" min="1" th:field="*{numero}" required>
                </div>

                <div class="form-field">
                    <label for="nome">Nome opzionale</label>
                    <input id="nome" type="text" th:field="*{nome}">
                </div>

                <div class="form-field">
                    <label for="capienza">Capienza</label>
                    <input id="capienza" type="number" min="1" th:field="*{capienza}" required>
                </div>

                <div class="form-field">
                    <label for="posizione">Posizione</label>
                    <select id="posizione" th:field="*{posizione}" required>
                        <option value="INTERNO">Interno</option>
                        <option value="ESTERNO">Esterno</option>
                    </select>
                </div>

                <label class="checkbox-item form-field-wide">
                    <input type="checkbox" th:field="*{disponibile}">
                    <span>Disponibile per nuove prenotazioni</span>
                </label>
            </div>

            <div class="form-actions">
                <button class="primary-button" type="submit">Salva modifiche</button>
                <a class="ghost-button" th:href="@{/admin/tavoli}">Annulla</a>
            </div>
        </form>
    </main>
</body>
</html>
