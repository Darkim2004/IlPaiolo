<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica tavolo</title>
</head>
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href ="@{/prenotazioni}">Prenotazioni</a>
    <a th:href="@{/eventi}">Eventi</a>
    <a th:href="@{/giochi}">Giochi</a>
</nav>

<hr>

<h1>Modifica tavolo</h1>

<form th:action="@{/admin/tavoli/{id}/modifica(id=${tavolo.id})}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <p>
        <label>Numero<br>
            <input type="number" name="numero" min="1"
                   th:value="${tavolo.numero}" required>
        </label>
    </p>
    <p>
        <label>Nome (opzionale)<br>
            <input type="text" name="nome" th:value="${tavolo.nome}">
        </label>
    </p>
    <p>
        <label>Capienza<br>
            <input type="number" name="capienza" min="1"
                   th:value="${tavolo.capienza}" required>
        </label>
    </p>
    <p>
        <label>Posizione<br>
            <select name="posizione" required>
                <option value="INTERNO" th:selected="${tavolo.posizione.name() == 'INTERNO'}">Interno</option>
                <option value="ESTERNO" th:selected="${tavolo.posizione.name() == 'ESTERNO'}">Esterno</option>
            </select>
        </label>
    </p>
    <p>
        <label>
            <input type="checkbox" name="disponibile" value="true"
                   th:checked="${tavolo.disponibile}">
            Disponibile
        </label>
    </p>

    <button type="submit">Salva modifiche</button>
    <a href="/admin/tavoli">Annulla</a>
</form>

</body>
</html>
