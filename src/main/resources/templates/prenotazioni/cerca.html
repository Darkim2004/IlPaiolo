<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{componenti :: head('Scegli un tavolo - Il Paiolo')}"></head>
<body>
    <header th:replace="~{componenti :: siteHeader(@{/login}, 'Login')}"></header>

    <main>
        <section class="page-hero" aria-labelledby="tavoli-disponibili-title">
            <div>
                <p class="eyebrow">Prenotazioni</p>
                <h1 id="tavoli-disponibili-title">Tavoli disponibili</h1>
                <p class="intro">Conferma il tavolo che preferisci per completare la prenotazione.</p>
            </div>
            <a class="ghost-button" th:href="@{/prenotazioni/nuova}">Cambia ricerca</a>
        </section>

        <section class="event-panel">
            <div class="summary-grid">
                <div>
                    <span class="detail-label">Data</span>
                    <strong th:text="${#temporals.format(data, 'dd/MM/yyyy')}">20/06/2026</strong>
                </div>
                <div>
                    <span class="detail-label">Orario</span>
                    <strong th:text="${#temporals.format(oraInizio, 'HH:mm') + ' - ' + #temporals.format(oraFine, 'HH:mm')}">20:30 - 23:00</strong>
                </div>
                <div>
                    <span class="detail-label">Persone</span>
                    <strong th:text="${numeroPersone}">4</strong>
                </div>
            </div>
        </section>

        <th:block th:if="${#lists.isEmpty(tavoli)}">
            <section th:replace="~{componenti :: emptyPanel('Nessun tavolo disponibile', 'Prova un orario diverso o riduci il numero di persone.')}"></section>
        </th:block>

        <section class="choice-grid" th:if="${!#lists.isEmpty(tavoli)}" aria-label="Tavoli disponibili">
            <article class="table-choice event-panel" th:each="t : ${tavoli}">
                <div>
                    <p class="eyebrow" th:text="${t.posizione}">INTERNO</p>
                    <h2>
                        Tavolo <span th:text="${t.numero}">1</span>
                        <span th:if="${t.nome != null and !#strings.isEmpty(t.nome)}" th:text="' - ' + ${t.nome}"> - Sala</span>
                    </h2>
                </div>

                <div class="summary-grid">
                    <div>
                        <span class="detail-label">Capienza</span>
                        <strong th:text="|${t.capienza} posti|">4 posti</strong>
                    </div>
                    <div>
                        <span class="detail-label">Disponibilita'</span>
                        <strong th:text="${t.disponibile ? 'Disponibile' : 'Non disponibile'}">Disponibile</strong>
                    </div>
                </div>

                <form th:action="@{/prenotazioni/nuova}" method="post">
                    <input th:replace="~{componenti :: csrfInput}">
                    <input type="hidden" name="tavoloId" th:value="${t.id}">
                    <input type="hidden" name="data" th:value="${data}">
                    <input type="hidden" name="oraInizio" th:value="${oraInizio}">
                    <input type="hidden" name="oraFine" th:value="${oraFine}">
                    <input type="hidden" name="numeroPersone" th:value="${numeroPersone}">

                    <div class="form-field">
                        <label th:for="${'note-' + t.id}">Note opzionali</label>
                        <textarea th:id="${'note-' + t.id}" name="note" rows="3"></textarea>
                    </div>

                    <div class="form-actions">
                        <button class="primary-button" type="submit">Prenota questo tavolo</button>
                    </div>
                </form>
            </article>
        </section>
    </main>
</body>
</html>
