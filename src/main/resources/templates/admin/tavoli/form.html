<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuovo tavolo</title>
</head>
<body>

<nav>
    <a th:href="@{/}">Home</a>
    <a th:href ="@{/prenotazioni}">Prenotazioni</a>
    <a th:href="@{/eventi}">Eventi</a>
    <a th:href="@{/giochi}">Giochi</a>
</nav>

<hr>

<h1>Nuovo tavolo</h1>

<form action="/admin/tavoli/nuovo" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <p>
        <label>Numero<br>
            <input type="number" name="numero" min="1" required>
        </label>
    </p>
    <p>
        <label>Nome (opzionale)<br>
            <input type="text" name="nome">
        </label>
    </p>
    <p>
        <label>Capienza<br>
            <input type="number" name="capienza" min="1" required>
        </label>
    </p>
    <p>
        <label>Posizione<br>
            <select name="posizione" required>
                <option value="">-- Seleziona --</option>
                <option value="INTERNO">Interno</option>
                <option value="ESTERNO">Esterno</option>
            </select>
        </label>
    </p>
    <p>
        <label>
            <input type="checkbox" name="disponibile" value="true" checked>
            Disponibile
        </label>
    </p>

    <button type="submit">Crea tavolo</button>
    <a href="/admin/tavoli">Annulla</a>
</form>

</body>
</html>
